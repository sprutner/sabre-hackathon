    HotelCreateBookingRequest:
      description: |
        ##### SCENARIO
        In this example, we will create a **new hotel booking using a booking key**. The request will contain all necessary information to create the booking, including traveler information, contact details, hotel details, and payment information.
        ##### INSTRUCTION
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `agency`| Information about the agency making the booking. |
        | `travelers`| Lists travelers (guests) to include in the booking. |
        | `hotel.bookingKey`| The booking key obtained from a previous Hotel Price Check API call. |
        | `hotel.rooms`| Lists rooms to include in the booking. |
        | `hotel.formOfPayment`| Instruction to save the payment details of the newly created hotel booking.|
