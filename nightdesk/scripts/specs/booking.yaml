    CheckFlightTicketsRequest:
      description: |
        ##### SCENARIO
        In this example, we will submit a ticket to **get information about change, refund and void policies**, including respective amounts. Instead of one ticket item, we could provide more to check tickets belonging to the same reservation in a single request.
        We will also request the API to override the airline refund policy with the applicable commission amount.
        ##### INSTRUCTION
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `number`| The document number (ticket). |
        | `refundQualifiers.commissionAmount`| The commission amount used to override the default refund values. |

      value:
        {
          "tickets": [
            {
              "number": "0167489825830",
              "refundQualifiers": {
                "commissionAmount": "25.00"
              }
            }
          ]
        }
    VoidFlightTicketsRequest:
      description: |
        ##### SCENARIO
        In this example, we will submit a list of tickets to be voided (the information whether a ticket can be voided or not will be returned by checkFlightTickets API). If the tickets were issued on a different Pcc than the one used to submit the request, the `targetPcc` parameter is required to specify the original Pcc.
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `tickets`| The list of document numbers (tickets) to be voided. |
      value:
        {
          "tickets": [
            "0015519872361",
            "0015519872362"
          ]
        }
    VoidFlightTicketsResponse:
      description: |
        ##### SUMMARY
        The response returned a copy of the request. The HTTP status determines whether the process was successful or not. Details of the voided tickets are retrieved. If the ticket was successfully voided, it will be included in the `voidedTickets` array.
        ##### NEXT STEPS
        If the booking (itinerary) was not cancelled before, proceed with booking cancellation, or retrieve booking details to validate the state of the reservation.
      value:
        {
          "timestamp": "2026-02-25T07:52:31",
          "request": {
            "errorHandlingPolicy": "HALT_ON_ERROR",
            "tickets": [
              "0015519872361",
              "0015519872362"
            ],
            "voidNonElectronicTickets": false
          },
          "voidedTickets": [
            "0015519872361",
            "0015519872362"
          ]
        }
    RefundFlightTicketsRequest:
      description: |
        ##### SCENARIO
        In this example, we will submit a list of tickets to be refunded (the information whether a ticket can be refunded or not will be returned by checkFlightTickets API). Depending on the Pcc settings and accounting needs it may be necessary to designate a printer or a printing profile.
        As a default, the API will refund only the electronic tickets, If you want to refund Electronic Miscellaneous Documents (EMD) or a combination of both, set the `documentsType` parameter with the appropriate value.
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `tickets.number`| The list of document numbers (tickets or EMDs) to be refunded. |
      value:
        {
          "tickets": [
            {
              "number": "1605519872360"
            }
          ],
          "designatePrinters": [
            {
              "hardcopy": {
                "address": "498BF1"
              }
            },
            {
              "ticket": {
                "countryCode": "AT"
              }
            }
          ]
        }
    RefundFlightTicketsResponse:
      description: |
        ##### SUMMARY
        The response returned a copy of the request. The HTTP status determines whether the process was successful or not. Details of the requested ticket are retrieved. Refund totals are provided as well.
        ##### NEXT STEPS
        If the booking (itinerary) was not cancelled before, proceed with booking cancellation, or retrieve booking details to validate the state of the reservation.
      value:
        {
          "timestamp": "2026-02-25T07:09:57",
          "request": {
            "errorHandlingPolicy": "HALT_ON_ERROR",
            "tickets": [
              {
                "number": "1605519872360"
              }
            ],
            "designatePrinters": [
              {
                "hardcopy": {
                  "address": "498BF1"
                }
              },
              {
                "ticket": {
                  "countryCode": "AT"
                }
              }
            ],
            "documentsType": "Tickets"
          },
          "tickets": [
            {
              "number": "1605519872360",
              "refundTotals": {
                "subtotal": "1120.00",
                "taxes": "234.42",
                "total": "1354.42",
                "currencyCode": "PLN"
              }
            }
          ],
          "refundedTickets": [
            "1605519872360"
          ]
        }
    FulfillFlightTicketsRequest:
      description: |
        ##### SCENARIO
        In this example, we will fulfill a newly created booking for ATPCO distribution model and issue tickets. Prior to fulfillment, make sure that the booking has been confirmed and priced (getBooking response contains details of at least one saved fare within `.fares` array). Depending on the Pcc settings and accounting needs it will be necessary to designate a printer or a printing profile.
        On top of that, make sure you pass the details of the form of payment used for the booking, as it is required for ticketing. The API will return the same form of payment details in the response, so you can use it for reconciliation purposes.
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `confirmationId`| The confirmation ID of the booking to be fulfilled. |
        | `fulfillments.ticketingQualifiers.priceQuoteRecordIds`| The list of price quote record IDs associated with the booking. Typically a price quote record ID is associated to a passenger type (adult, child or infant)|
        | `fulfillments.ticketingQualifiers`| The ticketing qualifiers for the fulfillment request. |
        | `fulfillments.payment.primaryFormOfPayment`| The primary form of payment used for the booking. The index should match the item in the `formsOfPayment` array provided in the request. |
        | `designatePrinters`| The printers designated for the fulfillment request. |
        | `formsOfPayment`| The forms of payment used for the booking. |
        | `commitTicketToBookingWaitTime`| The wait time for committing the ticket to the booking. The default value of '3000' may be too short for some bookings (airlines). |
      value:
        {
          "confirmationId": "PLVFMD",
          "fulfillments": [
            {
              "ticketingQualifiers": {
                "priceQuoteRecordIds": [
                  "1"
                ]
              },
              "payment": {
                "primaryFormOfPayment": 1
              }
            }
          ],
          "designatePrinters": [
            {
              "hardcopy": {
                "address": "E52405"
              }
            },
            {
              "ticket": {
                "countryCode": "AT"
              }
            }
          ],
          "formsOfPayment": [
            {
              "type": "PAYMENTCARD",
              "cardTypeCode": "VI",
              "cardNumber": "4444333322221111",
              "cardSecurityCode": "123",
              "expiryDate": "2030-03"
            }
          ],
          "commitTicketToBookingWaitTime": 6000,
        }
    FulfillFlightTicketsResponse:
      description: |
        ##### SUMMARY
        The response returned a copy of the request. The HTTP status determines whether the process was successful or not. Details of the issued tickets are retrieved.
        ##### NEXT STEPS
        Depending on your needs, you can present this information to the end user, or proceed with booking modification or cancellation.
        If the `isCommitted` field for the ticket is `true`, the ticket is already associated with the booking. If not, we recommend checking the booking after a short delay to ensure the ticket has been properly committed.
        If, after the delay, the ticket is still not committed, we recommend voiding the ticket and fulfilling it again. This is because an uncommitted ticket may not be properly associated with the booking, which can lead to issues with itinerary retrieval and booking management in the future.
      value:
        {
          "timestamp": "2026-02-25T08:15:27",
          "tickets": [
