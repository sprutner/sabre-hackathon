    FlightCreateBookingRequest:
      description: |
        ##### SCENARIO
        In this example, we will create a **new flight booking for the ATPCO distribution model**. The request will contain all necessary information to create and price the booking, including traveler information, contact details, flight details, and payment information.
        ##### INSTRUCTION
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `travelers`| Lists travelers to include in the booking. |
        | `flightDetails.flights`| Lists flights to include in the booking. Note that for the ATPCO distribution model, this array should include all necessary flight details. |
        | `flightDetails.flightPricing`| Instruction to save the pricing details of the newly created flight booking.|
