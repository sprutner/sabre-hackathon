    ModifyStayRequest:
      description: |
        ##### SCENARIO
        In this example, we will **modify the check-in and checkout dates of an existing hotel booking** using a booking key. The request will contain details of the booking state `before` the change and `after` the change.
        
        ##### INSTRUCTION
        Minimal parameters required to process our request are as follows:

        | Parameter | Description |
        | :--- | ---: |
        | `bookingSignature`| The unique signature of the booking to modify. Obtained from a previous Get Booking call.|
        | `confirmationId`| The confirmation ID of the booking to modify. Obtained from a previous Get Booking call.|
        | `before`| The state of the booking before modification. It's a copy of the booking details retrieved from a previous Get Booking call. |
        | `after.hotels.bookingKey`| The booking key obtained from a previous Hotel Price Check API call. |
        | `after.hotels.checkInDate`| The updated check-in date for the hotel booking. |
        | `after.hotels.checkOutDate`| The updated checkout date for the hotel booking.|
